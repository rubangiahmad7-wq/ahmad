<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Kejar-kejaran</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <h1>Game Kejar-kejaran</h1>
    <p>Gunakan tombol panah untuk bergerak dan hindari penculik merah.</p>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="status">
      <span id="scoreLabel">Skor: 0</span>
      <span id="speedLabel">Kecepatan musuh: 1.0</span>
    </div>
    <button id="restartButton">Mulai Ulang</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
